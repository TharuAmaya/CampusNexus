name: CampusNexus Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x backend/mvnw

      - name: Build with Maven
        run: |
          backend/mvnw -B -U -f backend/pom.xml package || \
          backend/mvnw -B -U -f backend/pom.xml package
        
      - name: Run Tests
        run: backend/mvnw -B -f backend/pom.xml test
